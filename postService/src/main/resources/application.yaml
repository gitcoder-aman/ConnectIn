spring:
  application:
    name: post-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 9010
  servlet:
    context-path: /posts

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

