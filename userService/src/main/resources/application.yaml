spring:
  application:
    name: userService
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 9020
  servlet:
    context-path: /api/v1/users

jwt:
  secretKey: ${JWT_SECRET_KEY}
